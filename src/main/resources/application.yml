server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/openspecdemo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    default-property-inclusion: non_null

mybatis:
  mapper-locations: classpath*:mybatis/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: openspec-demo-secret-key-change-me
    expiration-seconds: 7200

logging:
  level:
    com.enterprise: info
