server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/openspecdemo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 2s
  jackson:
    default-property-inclusion: non_null

mybatis:
  mapper-locations: classpath*:mybatis/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: openspec-demo-secret-key-change-me
    expiration-seconds: 7200
  cache:
    redis:
      ttl-minutes: 30

logging:
  level:
    com.enterprise: info
